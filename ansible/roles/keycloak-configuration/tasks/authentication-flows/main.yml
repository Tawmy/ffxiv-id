---
- name: Configure browser flow
  ansible.builtin.import_tasks: browser.yml

- name: Configure registration flow
  ansible.builtin.import_tasks: registration.yml

- name: Remove unused empty-flow-template
  # Leftover from the v1 keycloak_authentication module, which required a
  # template flow to copy from. v2 builds flows declaratively and no longer
  # needs it.
  community.general.keycloak_authentication_v2:
    auth_keycloak_url: "{{ keycloak_url }}"
    auth_realm: master
    auth_client_id: "{{ keycloak_ansible_client_id }}"
    auth_client_secret: "{{ vault_keycloak_ansible_client_secret }}"
    validate_certs: "{{ validate_certs | default(true) }}"

    realm: "{{ keycloak_realm_name }}"
    alias: empty-flow-template
    state: absent
